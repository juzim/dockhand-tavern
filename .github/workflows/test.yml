name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Type check
        run: |
          echo "Running TypeScript type checks..."
          bun --eval "
          Promise.all([
            import('./src/utils.ts').then(() => console.log('✅ utils.ts')),
            import('./src/npm-client.ts').then(() => console.log('✅ npm-client.ts')),
            import('./src/dockhand-client.ts').then(() => console.log('✅ dockhand-client.ts')),
            import('./src/types.ts').then(() => console.log('✅ types.ts'))
          ]).then(() => {
            console.log('✅ All modules compiled successfully');
            process.exit(0);
          }).catch((e) => {
            console.error('❌ TypeScript compilation failed:', e);
            process.exit(1);
          });
          " || exit 1
